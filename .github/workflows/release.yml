name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI OIDC trusted publishing
      contents: write   # required to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install hatch and build
        run: pip install hatch build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import re, pathlib; m=re.search(r'__version__ = \"(.*)\"', pathlib.Path('src/nopaque/_version.py').read_text()); print(m.group(1))")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match package version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: hatch run test

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
